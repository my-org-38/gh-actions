name: Update NPM Dependencies
description: Checks if there are updates to NPM packages, and creates a PR with the updated package*.json files.
# 1- Base Branch
# 2- Target Branch
# 3- GH Token
# 4- Working Directory

inputs:
  base-branch:
    description: base branch for dependancy update checks
    required: false
    default: main

  target-branch:
    required: false
    description: branch from where PR is created
    default: update-dependencies

  gh-token:
    required: true
    description: Authentication for repo access
  
  wd:
    description: Working Directory of the project to check dependancy updates.
    required: true

  debug:
    required: false
    description: Whether the output debug messages to the console

runs:
  using: node24
  main: index.js
