name: Reusable Workflow

on:
  workflow_dispatch:
    inputs:
      target-dir:
        description: The dir for deploy process
        type: string
        default: dummy-dir
  
jobs:
  deploy:
    uses: ./.github/workflows/reusable-workflow-def.yaml
    with:
      target-dir: ${{ inputs.target-dir }}
  print-deploy-outputs:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Print Build Status
        run: |
          echo "${{ needs.deploy.outputs.build-status }}"
      - name: Print URL
        run: |
          echo "${{ needs.deploy.outputs.url }}"

      