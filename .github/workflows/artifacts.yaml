name: Using Atrifacts

on:
  workflow_dispatch:
    inputs:
      use-cache:
        type: boolean
        default: true
      target-env:
        type: environment
      node-version:
        type: choice
        default: "24.x"
        options:
          - 20.x
          - 22.x
          - 24.x

jobs:
  test-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "."
    steps:
      - name: Checkout Code
        id: chkout
        uses: actions/checkout@v4
      - name: Setup Node
        id: setnode
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
      - name: Download Cached Dependancies
        id: cache
        if: ${{ inputs.use-cache }}
        uses: actions/cache@v4
        with:
          path: node_modules
          key: deps-node-modules-${{ hashFiles('package-lock.json') }}
      - name: Install dependancies
        id: install
        if: ${{ steps.cache.outputs.cache-hit != 'true' }}
        run: npm ci
      - name: Unit Tests
        id: test
        run: npm run test
      - name: Build Code
        id: build
        run: npm run build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          path: build
          name: app
  deploy:
    runs-on: ubuntu-latest
    needs: test-build
    steps:
      - name: Download Atrifacts
        uses: actions/download-artifact@v4
        with:
          name: app
          path: build


