name: Using Contexts
run-name: Using Contexts | DEBUG - ${{ inputs.debug }}

on:
  push:
  workflow_dispatch:
    inputs:
        debug:
            type: boolean
            default: false

env:
  MY_NAME: "Hussam"

jobs:
  echo-data:
    runs-on: ubuntu-latest
    steps:
      - name: Display Information
        run: |
            echo "Event Name: ${{ github.event_name }}" 
            echo "Workflow: ${{ github.workflow }}" 
            echo "Ref: ${{ github.ref }}" 
            echo "Ref Name: ${{ github.ref_name }}" 
            echo "Event Name: ${{ github.event_name }}" 
            echo "Actor: ${{ github.actor }}"
            echo "My Var: ${{ env.MY_NAME }}"
  echo-data2:
    runs-on: ubuntu-latest
    env:
      MY_NAME: "Saudi"
    steps:
      - name: Display Var
        run: |
            echo "My Var: ${{ env.MY_NAME }}"
            
             
            