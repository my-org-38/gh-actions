name: Using Custom Composite Actions
on:
  workflow_dispatch: 
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node and NPM dependancies
        uses: ./.github/actions/composite-cache-deps
        with:
          node-version: 24.x
      - name: Test
        run: npm run test
      - name: Build
        run: npm run build
  