name: Using Caching

on:
  workflow_dispatch:
    inputs:
      use-cache:
        type: boolean
        default: true
      target-env:
        type: environment
      node-version:
        type: choice
        default: '24.x'
        options:
          - 20.x
          - 22.x
          - 24.x

jobs:
  install-deps: 
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "."
    outputs:
      deps-cache-key: ${{ steps.cache-key.outputs.CACHE_KEY}}
    steps:
      - name: Checkout Code
        id: chkout
        uses: actions/checkout@v4
      - name: Setup Node
        id: setnode
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
      - name: Calculate Cache Key
        id: cache-key
        run: echo "CACHE_KEY=deps-node-modules-${{ hashFiles('package-lock.json') }}" >> "$GITHUB_OUTPUT"
      - name: Download Cached Dependancies
        id: cache
        if: ${{ inputs.use-cache }}
        uses: actions/cache@v4
        with: 
          path: node_modules
          key: ${{ steps.cache-key.outputs.CACHE_KEY }} 
      # Skipped. if `inputs.use-case` is true. and `cache-hit` is true   
      - name: Install dependancies
        id: install
        if: ${{ steps.cache.outputs.cache-hit != 'true' }}
        run: npm ci
  lint-test:
    runs-on: ubuntu-latest
    needs: install-deps
    defaults:
      run:
        working-directory: "."
    steps:
      - name: Checkout Code
        id: chkout
        uses: actions/checkout@v4
      - name: Setup Node
        id: setnode
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
      - name: Download Cached Dependancies
        id: cache
        if: ${{ inputs.use-cache }}
        uses: actions/cache@v4
        with: 
          path: node_modules
          key: ${{ needs.install-deps.outputs.deps-cache-key }} 
      - name: Testing
        id: test
        run: npm run test
      - name: Linting
        id: lint
        run: echo "Linting..."
  build:
    runs-on: ubuntu-latest
    needs: install-deps
    defaults:
      run:
        working-directory: "."
    steps:
      - name: Checkout Code
        id: chkout
        uses: actions/checkout@v4
      - name: Setup Node
        id: setnode
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
      - name: Download Cached Dependancies
        id: cache
        if: ${{ inputs.use-cache }}
        uses: actions/cache@v4
        with: 
          path: node_modules
          key: ${{ needs.install-deps.outputs.deps-cache-key }} 
      - name: Building
        id: building
        run: npm run build

      
